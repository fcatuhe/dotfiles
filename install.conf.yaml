- plugins:
    - dotbot-age

- decrypt: true

- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ['~']

- link:
    # zsh
    ~/.aliases: zsh/aliases
    ~/.zprofile: zsh/zprofile
    ~/.zshenv: zsh/zshenv
    ~/.zshrc: zsh/zshrc
    ~/.zshenv.private: private/zsh/zshenv.private

    # git
    ~/.gitconfig: git/config
    ~/.config/git/ignore: git/ignore

    # ssh + aws (decrypted)
    ~/.ssh/config: private/ssh/config
    ~/.aws/config: private/aws/config

    # vscode
    ~/.config/Code/User/settings.json:
      path: vscode/settings.json
      if: '[ "$(uname)" = "Linux" ]'
    ~/Library/Application Support/Code/User/settings.json:
      path: vscode/settings.json
      if: '[ "$(uname)" = "Darwin" ]'

    # hyprland (Linux only)
    ~/.config/hypr:
      path: hypr
      if: '[ "$(uname)" = "Linux" ]'

    # waybar (Linux only)
    ~/.config/waybar:
      path: waybar
      if: '[ "$(uname)" = "Linux" ]'

    # environment.d (Linux only)
    ~/.config/environment.d:
      path: environment.d
      if: '[ "$(uname)" = "Linux" ]'

    # gh
    ~/.config/gh/config.yml: gh/config.yml
    ~/.config/gh/hosts.yml: gh/hosts.yml

    # claude
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/statusline-command.sh: claude/statusline-command.sh

    # pi
    ~/.pi/agent/settings.json: pi/settings.json
    ~/.pi/agent/skills/transcribe: pi/skills/transcribe
    # ~/.pi/agent/extensions/anthropic-web-search.ts: pi/extensions/anthropic-web-search.ts
