- plugins:
    - dotbot-age

- decrypt: true

- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ['~']

- link:
    # --- Shell ---
    ~/.zshenv: zsh/zshenv
    ~/.zshenv.private: private/zsh/zshenv.private
    ~/.zprofile:
      path: zsh/zprofile
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.zshrc: zsh/zshrc
    ~/.aliases: zsh/aliases

    # --- Version control ---
    ~/.gitconfig: git/config
    ~/.config/git/ignore: git/ignore
    ~/.config/gh/config.yml: gh/config.yml
    ~/.config/gh/hosts.yml: gh/hosts.yml

    # --- Credentials (decrypted via dotbot-age) ---
    ~/.ssh/config: private/ssh/config
    ~/.aws/config: private/aws/config

    # --- Package managers ---
    ~/.npmrc: npm/npmrc

    # --- Editors ---
    ~/.config/Code/User/settings.json:
      path: vscode/settings.json
      if: '[ "$(uname)" = "Linux" ]'
    ~/Library/Application Support/Code/User/settings.json:
      path: vscode/settings.json
      if: '[ "$(uname)" = "Darwin" ]'

    # --- macOS desktop ---
    ~/.config/openlogi/config.toml:
      path: openlogi/config.toml
      if: '[ "$(uname)" = "Darwin" ]'

    # --- Linux desktop ---
    ~/.config/hypr:
      path: hypr
      if: '[ "$(uname)" = "Linux" ]'
    ~/.config/waybar:
      path: waybar
      if: '[ "$(uname)" = "Linux" ]'
    ~/.config/environment.d:
      path: environment.d
      if: '[ "$(uname)" = "Linux" ]'

    # --- CLI tools ---
    ~/.local/bin/z: bin/z
    ~/.config/herdr/config.toml: herdr/config.toml
    ~/.config/ghostty/config: ghostty/config

    # --- AI agents ---
    ~/.pi/agent/settings.json: pi/settings.json
    ~/.pi/agent/extensions: pi/extensions
    ~/.pi/agent/skills: pi/skills

    ~/.agent-browser/.encryption-key: private/agent-browser/encryption-key
    ~/.agent-browser/auth: agent-browser/auth
