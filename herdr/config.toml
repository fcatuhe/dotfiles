onboarding = false

[theme]
name = "catppuccin"

[terminal]
default_shell = "/usr/bin/zsh"
shell_mode = "login"

[keys]
prefix = "ctrl+space"

[ui]
agent_panel_scope = "all"
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = false

[experimental]
kitty_graphics = true
pane_history = true
